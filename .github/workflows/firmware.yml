name: Build firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: Firmware profile
        required: true
        default: onekvm
        type: choice
        options:
          - onekvm
          - minimal
          - all
      runner:
        description: Build runner
        required: true
        default: ubuntu-24.04
        type: choice
        options:
          - ubuntu-24.04
          - self-hosted

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select:
    runs-on: ubuntu-24.04
    outputs:
      profiles: ${{ steps.select.outputs.profiles }}
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Select build matrix
        id: select
        env:
          REQUESTED_PROFILE: ${{ inputs.profile || 'onekvm' }}
          REQUESTED_RUNNER: ${{ inputs.runner || 'ubuntu-24.04' }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* || "$REQUESTED_PROFILE" == "all" ]]; then
            echo 'profiles=["minimal","onekvm"]' >> "$GITHUB_OUTPUT"
          else
            printf 'profiles=["%s"]\n' "$REQUESTED_PROFILE" >> "$GITHUB_OUTPUT"
          fi
          echo "runner=$REQUESTED_RUNNER" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    runs-on: ${{ needs.select.outputs.runner }}
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(needs.select.outputs.profiles) }}
    steps:
      - name: Checkout pinned sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: recursive
          persist-credentials: false

      - name: Reclaim hosted-runner disk space
        if: needs.select.outputs.runner != 'self-hosted'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache
          docker system prune -af || true
          available_kb="$(df -Pk "$GITHUB_WORKSPACE" | awk 'NR == 2 { print $4 }')"
          if (( available_kb < 39845888 )); then
            echo "At least 38 GiB is required; rerun with the self-hosted option." >&2
            exit 1
          fi

      - name: Restore OpenWrt downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .cache/dl
            .cache/feeds
          key: ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-${{ hashFiles('locks/sources.lock', 'locks/feeds.conf') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-

      - name: Prepare build filesystem
        run: |
          sudo mkdir -p "/mnt/xg040g-${{ matrix.profile }}"
          sudo chown -R "$USER:$(id -gn)" "/mnt/xg040g-${{ matrix.profile }}"

      - name: Build ${{ matrix.profile }} firmware
        env:
          WORK_DIR: /mnt/xg040g-${{ matrix.profile }}
        run: ./scripts/build.sh "${{ matrix.profile }}" --jobs "$(nproc)" --output "$GITHUB_WORKSPACE/output/${{ matrix.profile }}"

      - name: Prepare release assets
        run: ./scripts/package-release.sh "${{ matrix.profile }}" "output/${{ matrix.profile }}" "release/${{ matrix.profile }}"

      - name: Generate source bundle
        if: matrix.profile == 'onekvm'
        run: ./scripts/create-source-bundle.sh "$GITHUB_WORKSPACE/release/source-with-submodules.tar.zst"

      - name: Attest firmware
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: release/${{ matrix.profile }}/*.{bin,itb}

      - name: Attest source bundle
        if: matrix.profile == 'onekvm'
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: release/source-with-submodules.tar.zst

      - name: Upload firmware artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: firmware-${{ matrix.profile }}
          path: release/${{ matrix.profile }}/
          if-no-files-found: error
          retention-days: 7

      - name: Upload source artifact
        if: matrix.profile == 'onekvm'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-with-submodules
          path: release/source-with-submodules.tar.zst
          if-no-files-found: error
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - select
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: firmware-*
          path: release-dist
          merge-multiple: true

      - name: Download source bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-with-submodules
          path: release-dist

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd release-dist
          find . -type f ! -name SHA256SUMS -exec sha256sum {} \; | sort -k2 > SHA256SUMS
          printf '%s\n' \
            'Automated XG-040G-MD OpenWrt build.' \
            '' \
            'This remains a prerelease until MS2109 and CH9329 hardware validation is complete.' \
            > release-notes.md
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --prerelease \
            --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          while IFS= read -r asset; do
            gh release upload "$GITHUB_REF_NAME" "$asset" --repo "$GITHUB_REPOSITORY"
          done < <(find . -type f ! -name release-notes.md | sort)
