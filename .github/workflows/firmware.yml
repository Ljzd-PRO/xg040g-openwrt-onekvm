name: Build firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: Firmware profile
        required: true
        default: onekvm
        type: choice
        options:
          - onekvm
          - minimal
          - all
      runner:
        description: Build runner
        required: true
        default: ubuntu-24.04
        type: choice
        options:
          - ubuntu-24.04
          - self-hosted

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select:
    runs-on: ubuntu-24.04
    outputs:
      profiles: ${{ steps.select.outputs.profiles }}
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Select build matrix
        id: select
        env:
          REQUESTED_PROFILE: ${{ inputs.profile || 'onekvm' }}
          REQUESTED_RUNNER: ${{ inputs.runner || 'ubuntu-24.04' }}
        run: |
          if [[ "$REQUESTED_PROFILE" == "all" ]]; then
            echo 'profiles=["minimal","onekvm"]' >> "$GITHUB_OUTPUT"
          else
            printf 'profiles=["%s"]\n' "$REQUESTED_PROFILE" >> "$GITHUB_OUTPUT"
          fi
          echo "runner=$REQUESTED_RUNNER" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    runs-on: ${{ needs.select.outputs.runner }}
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(needs.select.outputs.profiles) }}
    steps:
      - name: Checkout pinned sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive
          persist-credentials: false

      - name: Reclaim hosted-runner disk space
        if: needs.select.outputs.runner != 'self-hosted'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache
          docker system prune -af || true
          available_kb="$(df -Pk "$GITHUB_WORKSPACE" | awk 'NR == 2 { print $4 }')"
          if (( available_kb < 39845888 )); then
            echo "At least 38 GiB is required; rerun with the self-hosted option." >&2
            exit 1
          fi

      - name: Restore OpenWrt downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/dl
            .cache/feeds
          key: ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-${{ hashFiles('locks/sources.lock', 'locks/feeds.conf') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-

      - name: Prepare build filesystem
        run: |
          sudo mkdir -p "/mnt/xg040g-${{ matrix.profile }}"
          sudo chown -R "$USER:$(id -gn)" "/mnt/xg040g-${{ matrix.profile }}"

      - name: Build ${{ matrix.profile }} firmware
        env:
          WORK_DIR: /mnt/xg040g-${{ matrix.profile }}
        run: ./scripts/build.sh "${{ matrix.profile }}" --jobs "$(nproc)" --output "$GITHUB_WORKSPACE/output/${{ matrix.profile }}"

      - name: Prepare release assets
        run: ./scripts/package-release.sh "${{ matrix.profile }}" "output/${{ matrix.profile }}" "release/${{ matrix.profile }}"

      - name: Generate source bundle
        if: matrix.profile == 'onekvm'
        run: ./scripts/create-source-bundle.sh "$GITHUB_WORKSPACE/release/source-with-submodules.tar.zst"

      - name: Attest firmware
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            release/${{ matrix.profile }}/*.bin
            release/${{ matrix.profile }}/*.itb

      - name: Attest standalone One-KVM APKs
        if: matrix.profile == 'onekvm'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release/${{ matrix.profile }}/*.apk

      - name: Attest source bundle
        if: matrix.profile == 'onekvm'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release/source-with-submodules.tar.zst

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firmware-${{ matrix.profile }}
          path: release/${{ matrix.profile }}/
          if-no-files-found: error
          retention-days: 7

      - name: Upload source artifact
        if: matrix.profile == 'onekvm'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-with-submodules
          path: release/source-with-submodules.tar.zst
          if-no-files-found: error
          retention-days: 7
